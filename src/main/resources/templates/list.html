<!doctype html>
<html lang="en" xmlns:th ="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<h2>Danh sách nhân viên</h2>


<a name="" id="" class="btn btn-primary" th:href="@{/add}"  role="button">Thêm mới</a>
<form method="get" th:action="@{/}">
    <!-- giữ paging + sort -->
    <input type="hidden" name="page" value="0"/>

    <!-- keyword -->
    <input type="text"
           name="keyword"
           placeholder="Tên nhân viên"
           th:value="${keyword}" />

    <!-- department -->
    <select name="departmentId">
        <option value="">-- Phòng ban --</option>
        <option th:each="d : ${departments}"
                th:value="${d.id}"
                th:text="${d.name}"
                th:selected="${departmentId == d.id}">
        </option>
    </select>

    <!-- age range -->
    <input type="number" name="ageFrom"
           placeholder="Tuổi từ"
           th:value="${ageFrom}" />

    <input type="number" name="ageTo"
           placeholder="đến"
           th:value="${ageTo}" />

    <!-- sort -->
    <select name="sortBy">
        <option value="name" th:selected="${sortBy == 'name'}">Tên</option>
        <option value="age" th:selected="${sortBy == 'age'}">Tuổi</option>
    </select>

    <select name="direction">
        <option value="asc" th:selected="${direction == 'asc'}">Tăng</option>
        <option value="desc" th:selected="${direction == 'desc'}">Giảm</option>
    </select>

    <button type="submit">Lọc</button>
</form>
<table border="1">
    <tr>
        <th>Ảnh</th>
        <th>Tên</th>
        <th>Tuổi</th>
        <th>Phòng ban</th>
    </tr>
    <tr th:if="${totalPages == 0}">
        <td colspan="4">Không tìm thấy nhân viên nào</td>
    </tr>
    <tr th:each="e : ${employees.content}">
        <td>
            <img th:if="${e.avatar != null}"
                 th:src="${e.avatar}"
                 width="80" height="80"/>
            <img th:if="${e.avatar == null}"
                 th:src="@{https://res.cloudinary.com/dbvsngzks/image/upload/v1777624787/73e721ae-d131-48b8-836e-da4d5c14c76e.jpg}"/>
        </td>
        <td th:text="${e.name}"></td>
        <td th:text="${e.age}"></td>
        <td th:text="${e.department.name}"></td>
    </tr>

</table>
<nav th:if="${totalPages >0}" aria-label="Page navigation" >
    <ul class="pagination">
        <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
            <a class="page-link"
               th:href="@{|/?page=${currentPage - 1}&keyword=${keyword}&departmentId=${departmentId}&ageFrom=${ageFrom}&ageTo=${ageTo}&sortBy=${sortBy}&direction=${direction}|}">
                <span aria-hidden="true">&laquo;</span>
                <span class="sr-only">Previous</span>
            </a>
        </li>
<!--        <li class="page-item active"><a class="page-link" href="#"></a></li>-->
        <li class="page-item" th:each="n : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == n -1 ? 'active' : 'n' }">
            <a class="page-link"
               th:href="@{|/?page=${n - 1}&keyword=${keyword}&departmentId=${departmentId}&ageFrom=${ageFrom}&ageTo=${ageTo}&sortBy=${sortBy}&direction=${direction}|}"
               th:text="${n}">
            </a>
        </li>
        <li class="page-item" th:classappend="${currentPage == totalPages -1 ? 'disabled' : ''}">
            <a class="page-link"
               th:href="@{|/?page=${currentPage + 1}&keyword=${keyword}&departmentId=${departmentId}&ageFrom=${ageFrom}&ageTo=${ageTo}&sortBy=${sortBy}&direction=${direction}|}">
                <span aria-hidden="true">&raquo;</span>
                <span class="sr-only">Next</span>
            </a>
        </li>
    </ul>
</nav>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
